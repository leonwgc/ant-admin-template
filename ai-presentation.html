<h2 id="context-%E7%AE%A1%E7%90%86%E7%AD%96%E7%95%A5">Context 管理策略</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌─────────────────────────────────────┐
│  当 Context 超出限制时...           │
├─────────────────────────────────────┤
│  1. 截断 - 删除最旧的对话           │
│  2. 摘要 - 压缩历史信息             │
│  3. 滑动窗口 - 保留最近 N 条        │
│  4. RAG - 仅加载相关片段            │
└─────────────────────────────────────┘
</code></pre>
<p><strong>关键</strong>: Context 越大，成本越高，速度越慢</p>

   ↓

<li><strong>用途</strong>: 上下文连贯</li>
</ul>
<h3 id="2%EF%B8%8F%E2%83%A3-user-memory-%E7%94%A8%E6%88%B7%E8%AE%B0%E5%BF%86"><img class="emoji" draggable="false" alt="2️⃣" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/32-20e3.svg" data-marp-twemoji=""/> User Memory (用户记忆)</h3>
<ul>
<li><strong>范围</strong>: 跨会话</li>

</ul>

<h2 id="%E5%B8%B8%E8%A7%81%E9%97%AE%E9%A2%98-faq">常见问题 FAQ</h2>
<h3 id="q1-%E5%A6%82%E4%BD%95%E9%80%89%E6%8B%A9%E5%90%88%E9%80%82%E7%9A%84-llm">Q1: 如何选择合适的 LLM？</h3>
<p><strong>A</strong>: 根据场景选择</p>
<ul>
<li>复杂推理 → GPT-4, Claude Opus</li>
<li>日常对话 → GPT-3.5, Claude Haiku</li>
<li>长文本 → Claude, Gemini</li>
<li>成本敏感 → Llama, 国产模型</li>
</ul>
<h3 id="q2-context-%E5%A4%AA%E5%A4%A7%E6%80%8E%E4%B9%88%E5%8A%9E">Q2: Context 太大怎么办？</h3>
<p><strong>A</strong>: 使用 RAG (检索增强生成)</p>
<ul>
<li>将文档存入向量数据库</li>
<li>根据问题检索相关片段</li>
<li>仅将相关内容加入 Context</li>
</ul>
